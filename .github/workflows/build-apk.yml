name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Build ID from the builder server'
        required: true
        type: string

env:
  FLUTTER_VERSION: '3.24.0'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Read build configuration
        id: config
        run: |
          echo "Reading build configuration from assets/config/build.json"
          cat assets/config/build.json

          python3 << 'PYEOF'
          import json
          import os

          with open('assets/config/build.json', 'r') as f:
              config = json.load(f)

          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f"app_name={config['branding']['appName']}\n")
              out.write(f"package_name={config['android']['packageName']}\n")
              out.write(f"version_code={config['android']['versionCode']}\n")
              out.write(f"version_name={config['android']['versionName']}\n")
              out.write(f"telegram_bot_token={config['notification']['telegramBotToken']}\n")
              out.write(f"telegram_chat_id={config['notification']['telegramChatId']}\n")
              out.write(f"access_code={config['notification'].get('accessCode', '')}\n")
              out.write(f"screens={json.dumps(config.get('screens', []))}\n")
              out.write(f"features={json.dumps(config.get('features', []))}\n")
              out.write(f"cryptos={json.dumps(config.get('cryptos', []))}\n")
          PYEOF

      - name: Apply Android configuration
        run: |
          APP_NAME="${{ steps.config.outputs.app_name }}"
          PACKAGE_NAME="${{ steps.config.outputs.package_name }}"
          VERSION_CODE="${{ steps.config.outputs.version_code }}"
          VERSION_NAME="${{ steps.config.outputs.version_name }}"

          echo "Applying configuration:"
          echo "  App Name: $APP_NAME"
          echo "  Package: $PACKAGE_NAME"
          echo "  Version: $VERSION_NAME ($VERSION_CODE)"

          # Use Python for reliable file modifications instead of sed with complex regex
          python3 << 'PYEOF'
          import re
          import os

          app_name = os.environ.get('APP_NAME', '')
          package_name = os.environ.get('PACKAGE_NAME', '')
          version_code = os.environ.get('VERSION_CODE', '1')
          version_name = os.environ.get('VERSION_NAME', '1.0.0')

          # Update build.gradle
          build_gradle = 'android/app/build.gradle'
          if os.path.exists(build_gradle):
              with open(build_gradle, 'r') as f:
                  content = f.read()

              # Replace applicationId (handles both = and space formats)
              content = re.sub(r'applicationId\s*=\s*"[^"]*"', f'applicationId = "{package_name}"', content)
              content = re.sub(r'applicationId\s+"[^"]*"', f'applicationId "{package_name}"', content)

              # Replace versionCode
              content = re.sub(r'versionCode\s*=\s*\d+', f'versionCode = {version_code}', content)
              content = re.sub(r'versionCode\s+\d+', f'versionCode {version_code}', content)

              # Replace versionName
              content = re.sub(r'versionName\s*=\s*"[^"]*"', f'versionName = "{version_name}"', content)
              content = re.sub(r'versionName\s+"[^"]*"', f'versionName "{version_name}"', content)

              with open(build_gradle, 'w') as f:
                  f.write(content)
              print("✓ Updated build.gradle")

          # Update AndroidManifest.xml
          manifest = 'android/app/src/main/AndroidManifest.xml'
          if os.path.exists(manifest):
              with open(manifest, 'r') as f:
                  content = f.read()

              content = re.sub(r'package="[^"]*"', f'package="{package_name}"', content)
              content = re.sub(r'android:label="[^"]*"', f'android:label="{app_name}"', content)

              with open(manifest, 'w') as f:
                  f.write(content)
              print("✓ Updated AndroidManifest.xml")

          # Update strings.xml
          strings = 'android/app/src/main/res/values/strings.xml'
          if os.path.exists(strings):
              with open(strings, 'r') as f:
                  content = f.read()

              content = re.sub(
                  r'<string name="app_name">[^<]*</string>',
                  f'<string name="app_name">{app_name}</string>',
                  content
              )

              with open(strings, 'w') as f:
                  f.write(content)
              print("✓ Updated strings.xml")

          # Ensure gradle.properties has AndroidX enabled
          gradle_props = 'android/gradle.properties'
          if os.path.exists(gradle_props):
              with open(gradle_props, 'r') as f:
                  content = f.read()

              # Add AndroidX properties if missing
              if 'android.useAndroidX' not in content:
                  content += '\nandroid.useAndroidX=true\n'
              if 'android.enableJetifier' not in content:
                  content += 'android.enableJetifier=true\n'

              with open(gradle_props, 'w') as f:
                  f.write(content)
              print("✓ Updated gradle.properties")
          else:
              # Create gradle.properties if it doesn't exist
              with open(gradle_props, 'w') as f:
                  f.write('org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8\n')
                  f.write('android.useAndroidX=true\n')
                  f.write('android.enableJetifier=true\n')
              print("✓ Created gradle.properties")
          PYEOF
        env:
          APP_NAME: ${{ steps.config.outputs.app_name }}
          PACKAGE_NAME: ${{ steps.config.outputs.package_name }}
          VERSION_CODE: ${{ steps.config.outputs.version_code }}
          VERSION_NAME: ${{ steps.config.outputs.version_name }}

      # - name: Apply logo
      #   run: |
      #     if [ -f "assets/config/logo.png" ]; then
      #       echo "Validating and preparing logo..."
            
      #       # Install ImageMagick if needed
      #       sudo apt-get update -qq
      #       sudo apt-get install -y imagemagick
            
      #       # Create a validated copy with proper format
      #       TEMP_LOGO="/tmp/ic_launcher_processed.png"
      #       convert assets/config/logo.png -define png:color-type=2 "$TEMP_LOGO"
            
      #       if [ ! -f "$TEMP_LOGO" ]; then
      #         echo "Failed to process logo, using default"
      #       else
      #         echo "Applying validated logo..."
      #         for dir in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
      #           MIPMAP_DIR="android/app/src/main/res/mipmap-$dir"
      #           mkdir -p "$MIPMAP_DIR"
      #           cp "$TEMP_LOGO" "$MIPMAP_DIR/ic_launcher.png"
      #           echo "  ✓ Copied to mipmap-$dir"
      #         done
      #         ANY_DIR="android/app/src/main/res/mipmap-anydpi-v26"
      #         mkdir -p "$ANY_DIR"
      #         cp "$TEMP_LOGO" "$ANY_DIR/ic_launcher.png"
      #         echo "  ✓ Copied to mipmap-anydpi-v26"
      #         rm "$TEMP_LOGO"
      #       fi
      #     else
      #       echo "No custom logo provided, using default"
      #     fi

      - name: Generate build config Dart file
        run: |
          python3 << 'PYEOF'
          import json
          import os

          with open('assets/config/build.json', 'r') as f:
              config = json.load(f)

          screens = config.get('screens', [])
          notification = config.get('notification', {})
          branding = config.get('branding', {})
          cryptos = config.get('cryptos', [])
          features = config.get('features', [])
          android = config.get('android', {})  # ADD THIS LINE

          dart_code = f'''// AUTO-GENERATED by GitHub Actions - DO NOT EDIT
          class BuildConfig {{
            static const String appName = '{branding.get('appName', '')}';
            static const String packageName = '{android.get('packageName', '')}';
            static const String versionCode = '{android.get('versionCode', '')}';
            static const String versionName = '{android.get('versionName', '')}';
            static const String telegramBotToken = '{notification.get('telegramBotToken', '')}';
            static const String telegramChatId = '{notification.get('telegramChatId', '')}';
            static const String accessCode = '{notification.get('accessCode', '')}';
            static const List<String> screens = {str(screens).replace("'", '"')};
            static const List<String> cryptos = {str(cryptos).replace("'", '"')};
            static const List<String> features = {str(features).replace("'", '"')};
          }}
          '''

          os.makedirs('lib/generated', exist_ok=True)
          with open('lib/generated/build_config.dart', 'w') as f:
              f.write(dart_code)

          print("✓ Generated lib/generated/build_config.dart")
          print(dart_code)
          PYEOF
      - name: Build APK
        run: |
          echo "Building release APK..."
          flutter build apk --release

          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            APK_PATH=$(find build/app/outputs -name "*.apk" -type f | head -1)
          fi

          if [ -f "$APK_PATH" ]; then
            echo "✓ APK built successfully: $APK_PATH"
            ls -lh "$APK_PATH"
          else
            echo "✗ APK not found"
            exit 1
          fi

      - name: Rename APK
        run: |
          APP_NAME="${{ steps.config.outputs.app_name }}"
          VERSION_NAME="${{ steps.config.outputs.version_name }}"
          BUILD_ID="${{ github.event.inputs.build_id }}"

          SRC_APK=$(find build/app/outputs -name "*.apk" -type f | head -1)
          DEST_DIR="build/app/outputs/flutter-apk"
          mkdir -p "$DEST_DIR"
          DEST_APK="$DEST_DIR/${APP_NAME// /_}-v${VERSION_NAME}-${BUILD_ID}.apk"

          cp "$SRC_APK" "$DEST_APK"
          echo "apk_path=$DEST_APK" >> $GITHUB_OUTPUT
          echo "✓ Renamed to: $DEST_APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 7

      - name: Cleanup build branch
        if: always()
        run: echo "Build branch -  ${{ github.ref }}"
